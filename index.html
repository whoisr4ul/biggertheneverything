<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@roly_</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#000;
}

.video{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    border:none;
    z-index:1;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.25);
    z-index:2;
    pointer-events:none;
}

.card{
    position:fixed;
    top:50%;
    left:40px;
    transform:translateY(-50%);

    display:flex;
    align-items:center;
    gap:18px;

    background:rgba(0,0,0,.75);
    backdrop-filter:blur(12px);

    padding:18px 24px;

    border-radius:18px;
    border:1px solid rgba(255,255,255,.15);

    z-index:9999;

    box-shadow:0 0 30px rgba(0,0,0,.5);
}

.pfp{
    width:90px;
    height:90px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid rgba(255,255,255,.25);
}

.username{
    color:white;
    font-size:36px;
    font-weight:800;
    text-decoration:none;
    transition:.2s;
}

.username:hover{
    opacity:.8;
}

.subtitle{
    color:#bdbdbd;
    font-size:15px;
    margin-top:6px;
}
</style>
</head>

<body>

<iframe
class="video"
src="https://www.youtube.com/embed/_f0ftiBSvRs?controls=1&loop=1&playlist=_f0ftiBSvRs"
title="YouTube video player"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
allowfullscreen>
</iframe>

<div class="overlay"></div>

<div class="card">
    <img src="pfp.jpg" class="pfp" alt="Profile Picture">

    <div>
        <a class="username" href="https://discord.com/users/223089572999856128" target="_blank">@roly_</a>
        <div class="subtitle">bigger thën everything</div>
    </div>
</div>

</body>
</html>
