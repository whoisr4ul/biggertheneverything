<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>roly_</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.video{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    border:none;
    z-index:1;
}

.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.35);
    z-index:2;
}

.card{
    position:fixed;
    bottom:30px;
    left:30px;

    display:flex;
    align-items:center;
    gap:18px;

    background:rgba(0,0,0,.75);
    backdrop-filter:blur(12px);

    padding:18px 24px;

    border-radius:18px;
    border:1px solid rgba(255,255,255,.15);

    z-index:99999;

    box-shadow:0 0 30px rgba(0,0,0,.5);
}

.pfp{
    width:85px;
    height:85px;
    border-radius:50%;
    object-fit:cover;

    border:3px solid #5865F2;
}

.username{
    color:white;
    font-size:28px;
    font-weight:700;
}

.discord{
    color:#5865F2;
    font-size:18px;
    margin-top:4px;
}

.tag{
    color:#bbb;
    margin-top:6px;
    font-size:14px;
}
</style>
</head>

<body>

<iframe
class="video"
src="https://www.youtube.com/embed/_f0ftiBSvRs?autoplay=1&controls=1&loop=1&playlist=_f0ftiBSvRs"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

<div class="overlay"></div>

<div class="card">
    <img src="pfp.jpg" class="pfp">

    <div>
        <div class="username">roly_</div>
        <div class="discord">@roly_</div>
        <div class="tag">bigger thën everything</div>
    </div>
</div>

</body>
</html>
